<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações do PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d6efd" />

    <!-- Tags para funcionar no iPhone (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GestPer" />

    <!-- Ícones -->
    <link rel="apple-touch-icon" href="../imagens/certo.png" />
    <link rel="icon" type="image/png" href="../imagens/certo.png" />


    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title> Gestper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel='stylesheet' type='text/css' media='screen' href='css/login.css'>
</head>

<body>

    <div id="splash">
        <img src="imagens/icon-512.png" alt="Gestão de Permanência">
        <h1> GestPer </h1>
        <p>Gestão de Permanência</p>



    </div>
    <div class="background-glow"></div>

    <div class="login-wrapper">

        <div class="login-card">

            <div class="logo-circle">
                <img src="imagens/certo.png" alt="Logo">
            </div>

            <div class="login-top">
                <span class="mini-badge">Sistema SaaS</span>

                <h2>Sistema Gestper</h2>

                <p>
                    Plataforma de Gerenciamento e Cadastro de Alunos
                </p>
            </div>

            <div class="input-group">
                <label>E-mail</label>

                <div class="input-area">
                    <span class="input-icon">✉</span>

                    <input type="email" id="email" placeholder="Digite o seu email">
                </div>
            </div>

            <div class="input-group">
                <label>Senha</label>

                <div class="input-area">
                    <span class="input-icon">🔒</span>

                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>
            </div>

            <button onclick="efetuarLogin()">
                Entrar no Sistema
            </button>

            <div class="error" id="erro">
                Usuário ou Senha inválidos
            </div>

            <div class="footer">
                © 2026 Gestper • Sistema de Gerenciamento Escolar
            </div>

        </div>

    </div>

    <script src='javascript/login.js'></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Pronto! Seu site agora é um App.'))
                .catch((err) => console.log('Erro ao criar o App:', err));
        }
        
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash');
        
            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.transition = 'opacity 0.5s ease';
        
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500);
        
            }, 3000);
        });
    </script>

</body>

</html>
