<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Relatórios</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/relatorios.css">

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="header-left">

      <button class="menu-btn" id="menu-btn">
        ☰
      </button>

      <div class="logo-area">

        <img src="imagens/certo.png" alt="logo">

        <div class="logo-text">
          <h2>GestPer</h2>
          <span>Painel Administrativo</span>
        </div>

      </div>

    </div>

  </header>

  <!-- MENU -->
  <nav class="side-menu" id="side-menu">

    <ul>

      <li>
        <a href="#" onclick="abrirRelatorios()">
          📊 Relatórios
        </a>
      </li>

      <li>
        <a href="configuracoes.html">
          ⚙️ Usuários
        </a>
      </li>

      <li>
        <a href="upload.html">
          📁 Arquivos
        </a>
      </li>

      <div class="sair">

        <li>
          <a href="" onclick="sair()">
            🚪 Sair
          </a>
        </li>

      </div>

    </ul>

  </nav>

  <!-- PAGE -->
  <main class="page-content">

    <!-- HERO -->
    <section class="hero-card">

      <span class="mini-badge">
        Sistema SaaS
      </span>

      <h1>
        Relatórios de Permanência
      </h1>

      <p>
        Consulte alunos que receberam emails em um período específico.
      </p>

      <!-- FILTRO -->
      <div class="conteiner-filtro">

        <div class="separar">

          <!-- DATA INICIO -->
          <div class="input-group">

            <label>
              Data Inicial
            </label>

            <input
              type="date"
              id="data-inicio"
            >

          </div>

          <!-- DIVIDER -->
          <div class="divider">
            até
          </div>

          <!-- DATA FIM -->
          <div class="input-group">

            <label>
              Data Final
            </label>

            <input
              type="date"
              id="data-fim"
            >

          </div>

          <!-- BUTTON -->
          <div class="button-group">

            <button
              class="buscar"
              onclick="buscarPorData()"
            >
              Buscar Relatório
            </button>

          </div>

        </div>

        <!-- MESSAGE -->
        <small
          id="mensagem-data"
          class="message"
        ></small>

      </div>

    </section>

    <!-- TABELA -->
    <section class="table-card">

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>

              <th>ID</th>
              <th>Nome</th>
              <th>RA</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>Data Upload</th>

            </tr>

          </thead>

          <tbody id="corpo-tabela">
          </tbody>

        </table>

        <!-- PAGINAÇÃO -->
        <div class="paginacao">

          <button id="btn-anterior">
            ← Anterior
          </button>

          <span id="pagina-atual">
            Página 1
          </span>

          <button id="btn-proximo">
            Próximo →
          </button>

        </div>

      </div>

    </section>

  </main>

  <script src="javascript/relatorios.js"></script>
  <script src="javascript/menu.js" defer></script>

</body>

</html>
